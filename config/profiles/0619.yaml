  "timeline": "# ═══════════════════════════════════════════════════════════════\n#                   TrendRadar 时间线配置\n#                      Version: 1.0.0\n# ═══════════════════════════════════════════════════════════════\n#\n# 这个文件控制「什么时间做什么事」。\n#\n# 大多数人不需要编辑这个文件。\n# 只需在 config.yaml 中选择一个预设模板即可：\n#\n#   schedule:\n#     preset: \"morning_evening\"    ← 改这里就行\n#\n#\n# 可视化配置编辑器地址: https://AIYXDATA.github.io/TrendRadar/\n#\n#\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n# 📖 基本概念（帮助你理解后面的配置）\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n#\n#\n# 🔁 程序是怎么运行的？\n#\n#   TrendRadar 不是一直在后台运行的，而是被「定时闹钟」周期性唤醒：\n#\n#     GitHub Actions 用户 → 由 .github/workflows/crawler.yml 中的 cron 定时触发\n#                           默认每小时运行一次（如每小时第 33 分钟）\n#\n#     Docker 用户         → 由 docker/.env 中的 CRON_SCHEDULE 定时触发\n#                           默认每 30 分钟运行一次\n#\n#   每次被唤醒后，程序按以下三个阶段依次执行：\n#\n#     1️⃣ 采集（collect）\n#        爬取各热榜平台 + RSS 订阅源的最新数据，存入数据库\n#\n#                  ⬇\n#\n#     2️⃣ 分析（analyze）\n#        调用 AI 大模型对采集到的新闻进行深度分析（可选，需配置 API Key）\n#\n#                  ⬇\n#\n#     3️⃣ 推送（push）\n#        将整理好的热点新闻 + AI 分析结果发送到你的通知渠道\n#        （飞书、钉钉、Telegram、邮件等）\n#\n#   这三个阶段都可以独立开关。本文件的作用就是控制：\n#   「在什么时间段，开启/关闭哪些阶段」。\n#\n#\n# 🔌 config.yaml 总开关 与 timeline 时间段开关 的关系\n#\n#   config.yaml 里有几个「总开关」，它们的优先级高于本文件：\n#\n#     platforms.enabled: false   → 永远不爬热榜（无论 timeline 怎么设置）\n#     rss.enabled: false         → 永远不爬 RSS（同上）\n#     notification.enabled: false → 永远不推送（同上）\n#     ai_analysis.enabled: false  → 永远不分析（同上）\n#\n#   只有当总开关为 true 时，timeline 的时间段开关才会生效。\n#   换句话说：总开关决定「能不能做」，timeline 决定「什么时候做」。\n#\n#\n# ⏰ 什么是「时间段」和「静默期」？\n#\n#   你可以把一天想象成一条时间线，上面划分了若干个「时间段」。\n#   每个时间段有自己的行为开关（是否采集、是否分析、是否推送）。\n#\n#   而不在任何时间段内的时间，就叫「静默期」（走 default 默认配置）。\n#   静默期通常必须要采集，这样数据一直在积累，\n#   等到推送时，就能汇总出完整的报告。\n#\n#\n#   💡 静默期越长，积累的数据越丰富（排名变化轨迹、上榜/下榜时间等），\n#   最终提交给 AI 分析的上下文也越完整，分析质量更高。\n#   相比 MCP Server，该方案的全天数据能呈现更完整的热度趋势和变化脉络。\n#\n#\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n# 📋 预设模板一览（选一个就行）\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n#\n#   1️⃣ always_on        全天候，有新增就推（默认）\n#   2️⃣ morning_evening  全天推送 + 晚间汇总（推荐大多数人）\n#   3️⃣ office_hours     工作日三段式：到岗速览→午间热点→收工汇总\n#   4️⃣ night_owl        午后速览 + 深夜全天汇总\n#   5️⃣ custom           完全自定义（需要编辑本文件底部的 custom 段）\n#\n# 想自定义？两种方式：\n#   1. 直接翻到本文件底部的「自定义模式」部分\n#   2. 在下方 presets 里新增你自己的预设模板\n#      （只要 key 不重复，然后在 config.yaml 里填你的模板名即可）\n#\n# ⚠️ 关于时间段设计的建议：\n#   GitHub Actions： 建议定时任务间隔 ≥ 2 小时。由于系统触发存在随机延迟，间隔过短可能导致任务漏运行。\n#   Docker 用户：cron 定时是准时的，无此限制，按需设置即可。\n#\n#\n# ═══════════════════════════════════════════════════════════════\n\n\n# ───────────────────────────────────────────────────────────────\n# 预设模板\n# ───────────────────────────────────────────────────────────────\npresets:\n\n  # ───────────────────────────────────────────────────────────\n  # 1️⃣ always_on - 全天候监控\n  #\n  # 最简单的模式：全天候采集 + 推送，有新增就通知你。\n  # 不划分时间段，全天使用同一套配置。\n  # 适合：重度用户、实时舆情监控\n  #\n  # 全天：推送 ✓ | AI分析 ✗ | 不限推送次数\n  # ───────────────────────────────────────────────────────────\n  always_on:\n    name: \"全天监控\"\n    description: \"全天候监控，有新增立即推送。适合重度用户。\"\n\n    # 默认配置 ── 不在任何时间段内时，使用这组开关\n    # 因为这个模式没有划分时间段，所以 default 就是全天的行为\n    default:\n      collect: true                # 采集数据（爬取热榜 + RSS）\n      analyze: false               # 不做 AI 分析（节省 API 费用）\n      ai_mode: \"current\"           # AI 分析当前榜单\n      push: true                   # 有新内容就推送\n      report_mode: \"incremental\"   # 只推送新增内容，避免重复\n      once:                        # 限制每个时间段内只执行一次\n        analyze: false             #   不限制分析次数\n        push: false                #   不限制推送次数\n\n    # 没有定义任何时间段，全天都走 default\n    #\n    # 语法提示：{} 是 YAML 的「空字典」写法，表示里面没有任何内容。\n    # 等价于写成多行但什么都不填。后面的 [] 同理，表示「空列表」。\n    periods: {}\n    day_plans:\n      all_day:\n        periods: []                   # 空列表 = 这天不启用任何时间段\n    week_map:\n      1: \"all_day\"                 # 周一\n      2: \"all_day\"                 # 周二\n      3: \"all_day\"                 # 周三\n      4: \"all_day\"                 # 周四\n      5: \"all_day\"                 # 周五\n      6: \"all_day\"                 # 周六\n      7: \"all_day\"                 # 周日\n\n\n  # ───────────────────────────────────────────────────────────\n  # 2️⃣ morning_evening - 早晚汇总（推荐）\n  #\n  # 全天推送当前热点 + 晚间做一次当日全天汇总。\n  # 适合：大多数人\n  #\n  # 默认（全天）：推送 ✓ | AI分析 ✓ | 不限推送次数\n  # 晚间汇总：推送 ✓ | AI分析 ✓ | 只推/分析一次\n  # ───────────────────────────────────────────────────────────\n  morning_evening:\n    name: \"早晚汇总\"\n    description: \"全天推送 + 晚间当日汇总。适合大多数人。\"\n\n    # 默认配置 ── 不命中任何时间段时的行为\n    default:\n      collect: true                # 始终采集\n      analyze: true                # AI 分析当前榜单\n      ai_mode: \"current\"           # AI 分析当前榜单\n      push: true                   # 每次推送当前在榜热点\n      report_mode: \"current\"       # 当前在榜的新闻\n      once:\n        analyze: true             # 不限制分析次数\n        push: false                # 不限制推送次数\n\n    # 时间段定义 ── 只有晚间汇总需要特殊处理\n    periods:\n      evening_summary:\n        name: \"晚间汇总\"\n        start: \"22:30\"\n        end: \"23:00\"\n        analyze: true              # 晚间做 AI 分析\n        ai_mode: \"daily\"           # AI 也汇总全天内容\n        report_mode: \"daily\"       # 切换为当日全部新闻汇总\n        once:\n          analyze: true            # 窗口内只分析一次\n          push: true               # 窗口内只推送一次\n\n    # 日计划 ── 把时间段组装成一天的安排\n      morning:\n        name: \"早上推送\"\n        start: \"08:35\"\n        end: \"08:45\"\n        collect: true\n        analyze: false\n        push: true\n        report_mode: current\n      noonpush:\n        name: \"中午推送\"\n        start: \"12:30\"\n        end: \"13:30\"\n        collect: true\n        analyze: false\n        push: true\n        report_mode: current\n      afternoonpush:\n        name: \"下午推送\"\n        start: \"16:00\"\n        end: \"17:00\"\n        collect: true\n        analyze: false\n        push: true\n        report_mode: current\n    day_plans:\n      all_day:\n        periods: [\"evening_summary\"]\n\n    # 周映射 ── 每天用哪个日计划（1=周一 ... 7=周日）\n    week_map:\n      1: \"all_day\"\n      2: \"all_day\"\n      3: \"all_day\"\n      4: \"all_day\"\n      5: \"all_day\"\n      6: \"all_day\"\n      7: \"all_day\"\n\n\n  # ───────────────────────────────────────────────────────────\n  # 3️⃣ office_hours - 办公时间推送\n  #\n  # 工作日三段式推送，周末增量自由推。\n  # 适合：上班族、企业用户\n  #\n  # 默认（静默期）：推送 ✗ | AI分析 ✗\n  # 到岗速览：推送 ✓ | AI分析 ✓ | 只推一次\n  # 午间热点：推送 ✓ | AI分析 ✗ | 只推一次\n  # 收工汇总：推送 ✓ | AI分析 ✓ | 只推一次\n  # 周末自由：推送 ✓ | AI分析 ✗ | 不限推送次数\n  # ───────────────────────────────────────────────────────────\n  office_hours:\n    name: \"办公时间\"\n    description: \"工作日三段式推送（到岗→午间→收工），周末增量自由推送。\"\n\n    default:\n      collect: true\n      analyze: false\n      ai_mode: \"current\"\n      push: false                  # 默认不推送\n      report_mode: \"current\"\n      once:\n        analyze: true              # 每个时段只分析一次\n        push: true                 # 每个时段只推送一次\n\n    periods:\n      morning_briefing:\n        name: \"到岗速览\"\n        start: \"09:00\"\n        end: \"11:00\"\n        analyze: true              # AI 分析当前热点\n        ai_mode: \"current\"         # AI 分析当前榜单\n        push: true                 # 到岗后看当前热点\n        report_mode: \"current\"     # 当前在榜的新闻\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n      noon_update:\n        name: \"午间热点\"\n        start: \"13:00\"\n        end: \"15:00\"              \n        push: true                 # 午间推送当前在榜热点\n        report_mode: \"current\"     # 当前在榜的新闻\n        # analyze 继承 default: false → 午间不做 AI 分析，节省 API\n        # once 继承 default（push: true）→ 只推一次\n\n      closing_summary:\n        name: \"收工汇总\"\n        start: \"17:00\"\n        end: \"19:00\"\n        analyze: true              # AI 做全天汇总分析\n        ai_mode: \"daily\"           # AI 也分析全天内容\n        push: true                 # 下班前推送当日完整汇总\n        report_mode: \"daily\"       # 当日全部新闻汇总\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n      weekend_free:\n        name: \"周末自由\"\n        start: \"08:00\"\n        end: \"23:00\"\n        ai_mode: \"current\"         # AI 分析当前榜单\n        push: true                 # 有新增就推送\n        report_mode: \"incremental\" # 增量模式：有新增才推，没有就安静\n        once:\n          analyze: false           # 不限制分析次数\n          push: false              # 不限制推送次数\n\n    # 工作日使用三段式推送；周末使用增量自由模式\n    day_plans:\n      workday:\n        periods: [\"morning_briefing\", \"noon_update\", \"closing_summary\"]\n      weekend:\n        periods: [\"weekend_free\"]  # 周末：有新增就推，不打扰睡眠\n\n    week_map:\n      1: \"workday\"                 # 周一 → 工作日计划\n      2: \"workday\"\n      3: \"workday\"\n      4: \"workday\"\n      5: \"workday\"\n      6: \"weekend\"                 # 周六 → 周末计划\n      7: \"weekend\"                 # 周日 → 周末计划\n\n\n  # ───────────────────────────────────────────────────────────\n  # 4️⃣ night_owl - 夜猫子模式\n  #\n  # 白天安静，午后和深夜各推一次。\n  # 适合：夜间工作者、海外时差用户、自由职业者\n  #\n  # 默认（白天静默）：推送 ✗ | AI分析 ✗\n  # 午后速览：推送 ✓ | AI分析 ✓ | 只推一次\n  # 深夜汇总：推送 ✓ | AI分析 ✓ | 只推一次\n  # ───────────────────────────────────────────────────────────\n  night_owl:\n    name: \"夜猫子模式\"\n    description: \"午后速览 + 深夜全天汇总。适合夜间工作者、海外时差用户。\"\n\n    default:\n      collect: true\n      analyze: false\n      ai_mode: \"current\"\n      push: false\n      report_mode: \"current\"\n      once:\n        analyze: true              # 每个时段只分析一次\n        push: true                 # 每个时段只推送一次\n\n    periods:\n      afternoon_peek:\n        name: \"午后速览\"\n        start: \"15:00\"\n        end: \"17:00\"\n        analyze: true              # AI 分析当前热点\n        ai_mode: \"current\"         # AI 分析当前榜单\n        push: true                 # 午后看当前热点\n        report_mode: \"current\"     # 当前在榜的新闻\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n      late_night:\n        name: \"深夜汇总\"\n        start: \"22:00\"\n        end: \"01:00\"               # start > end → 自动识别为跨日\n        analyze: true              # AI 做全天汇总分析\n        ai_mode: \"daily\"           # AI 也分析全天内容\n        push: true                 # 深夜推送当日完整汇总\n        report_mode: \"daily\"       # 当日全部新闻汇总\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n    day_plans:\n      all_day:\n        periods: [\"afternoon_peek\", \"late_night\"]\n    week_map:\n      1: \"all_day\"\n      2: \"all_day\"\n      3: \"all_day\"\n      4: \"all_day\"\n      5: \"all_day\"\n      6: \"all_day\"\n      7: \"all_day\"\n\n\n# ═══════════════════════════════════════════════════════════════\n#\n# 5️⃣ 自定义模式\n#\n# 当 config.yaml 中设置 schedule.preset: \"custom\" 时，\n# 系统会读取下面这段配置。\n#\n# 如果上面的预设模板无法满足你的需求，可以在这里自由定义。\n#\n# ═══════════════════════════════════════════════════════════════\n#\n# 自定义配置的思路很简单，就像搭积木：\n#\n#   第 1 步：定义「积木块」（periods）\n#            每块积木 = 一个时间段 + 这段时间要做什么\n#            例如：早间 08-10 推送、晚间 19-21 汇总\n#\n#   第 2 步：拼成「一天的安排」（day_plans）\n#            把积木块组合起来，形成一天的日程\n#            例如：工作日用 [早间, 晚间]，周末用 [晚间]\n#\n#   第 3 步：指定「每天用哪个安排」（week_map）\n#            周一到周日，分别对应哪个日计划\n#            例如：周一~周五用 workday，周六周日用 weekend\n#\n#   另外还有一个「默认配置」（default），\n#   当某个时刻不在任何积木块内时，就用默认配置。\n#   积木块里没写的字段，也会自动回退到默认配置。\n#\n#\n# 下面是一个完整的自定义示例，工作日和周末使用不同的时间段安排：\n#\n#   工作日时间段:\n#     深夜静默 23:00-06:00（跨日）：采集 ✓ | 分析 ✓ | 推送 ✗\n#     工作日早间 08:00-10:00：推送 ✓ | incremental\n#     晚间汇总 19:00-21:00：推送 ✓ | 分析 ✓ | daily\n#     其余时间走默认配置（静默采集）\n#\n#   周末时间段:\n#     深夜静默 23:00-06:00（跨日）：采集 ✓ | 分析 ✓ | 推送 ✗\n#     周末早间 10:00-12:00：推送 ✓ | daily\n#     晚间汇总 19:00-21:00：推送 ✓ | 分析 ✓ | daily\n#     其余时间走默认配置（静默采集）\n\ncustom:\n  name: \"自定义\"\n  description: \"完全自由定义时间段、日计划和周映射。\"\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 默认配置\n  #\n  # 当前时刻不在任何时间段（积木块）内时，使用这组开关。\n  # 时间段中没有写的字段，也会回退到这里。\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  default:\n    collect: true                  # 是否采集数据（爬取热榜 + RSS）\n    analyze: true                 # 是否执行 AI 分析\n    ai_mode: \"current\"            # AI 分析模式:\n                                   #   follow_report → 跟随 report_mode\n                                   #   daily         → 强制全天汇总\n                                   #   current       → 强制当前榜单\n                                   #   incremental   → 强制增量模式\n    push: true                    # 是否发送推送通知\n    report_mode: \"current\"         # 报告模式:\n                                   #   daily       → 当日所有新闻的汇总\n                                   #   current     → 当前在榜的新闻\n                                   #   incremental → 只推送新增内容\n    once:\n      analyze: true                # 该时间段内只分析一次（省 API）\n      push: true                   # 该时间段内只推送一次（省打扰）\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 第 1 步：定义积木块（时间段）\n  #\n  # 每个时间段有一个唯一的 key（如 deep_quiet），\n  # 以及 start / end 表示生效的时间范围。\n  #\n  # 只需要写「和 default 不同的字段」，其余自动继承 default。\n  # 例如 weekday_morning 没写 collect，就会继承 default 的 collect: true。\n  #\n  # 提示：如果 start > end（如 22:00 → 07:00），\n  #       系统会自动识别为跨越午夜的时间段。\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  periods:\n\n    deep_quiet:\n      name: \"深夜静默\"\n      start: \"23:00\"\n      end: \"06:00\"                 # 23:00 → 次日 06:00（跨日时间段）\n      collect: true                # 夜间继续采集数据\n      analyze: true                # 夜间可以跑 AI 分析（反正不推送）\n      push: false                  # 深夜不推送，避免打扰\n\n    weekday_morning:\n      name: \"工作日早间\"\n      start: \"08:00\"\n      end: \"10:00\"                 # 跨度 2h，留足触发裕量\n      push: true                   # 早上推送一次\n      report_mode: \"incremental\"   # 只推新增内容\n      # once 继承 default（push: true）→ 窗口内只推一次\n\n    weekend_morning:\n      name: \"周末早间\"\n      start: \"10:00\"\n      end: \"12:00\"                 # 跨度 2h\n      push: true\n      report_mode: \"daily\"         # 周末看全天汇总\n      # once 继承 default（push: true）→ 窗口内只推一次\n\n    evening_summary:\n      name: \"晚间汇总\"\n      start: \"19:00\"\n      end: \"21:00\"\n      analyze: true                # 晚间做 AI 分析\n      ai_mode: \"daily\"             # AI 也分析全天内容\n      push: true                   # 晚间推送\n      report_mode: \"daily\"         # 当日全部新闻汇总\n      # once 继承 default（analyze: true, push: true）→ 只分析/推送一次\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 第 2 步：把积木块拼成日计划\n  #\n  # 把上面定义的时间段组合成一天的安排。\n  # 你可以定义多个日计划（如 workday 和 weekend），\n  # 然后在第 3 步的 week_map 中分配给不同的星期。\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  day_plans:\n    workday:                       # 工作日计划\n      periods: [\"deep_quiet\", \"weekday_morning\", \"evening_summary\"]\n    weekend:                       # 周末计划（用 weekend_morning 替换 weekday_morning）\n      periods: [\"deep_quiet\", \"evening_summary\"]\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 第 3 步：指定每天用哪个日计划\n  #\n  # 1=周一  2=周二  3=周三  4=周四  5=周五  6=周六  7=周日\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  week_map:\n    1: \"workday\"                   # 周一 → 工作日计划\n    2: \"workday\"                   # 周二\n    3: \"workday\"                   # 周三\n    4: \"workday\"                   # 周四\n    5: \"workday\"                   # 周五\n    6: \"weekend\"                   # 周六 → 周末计划\n    7: \"weekend\"                   # 周日\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 冲突策略（一般不用改）\n  #\n  # 什么是「冲突」？\n  #   如果你的两个时间段有重叠（比如 A 是 08:00-12:00，B 是 10:00-14:00），\n  #   那么 10:00-12:00 这段时间就同时属于 A 和 B，产生了冲突。\n  #   此时程序需要知道：到底听谁的？\n  #\n  # 两种处理方式：\n  #\n  #   error_on_overlap（推荐）\n  #     直接报错，提醒你去修改配置。\n  #     适合大多数人 —— 时间段重叠通常是写错了，报错能及时发现。\n  #\n  #   last_wins\n  #     day_plans 的 periods 列表中，写在后面的优先。\n  #     比如 periods: [\"A\", \"B\"]，重叠时 B 生效。\n  #     适合场景：你想用一个大范围时间段打底，再用后面的小范围覆盖。\n  #\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  overlap:\n    policy: \"error_on_overlap\"\n",
  "analysis_prompt": "[system]\nRole: 大消费增长情报分析师\nProfile\nlanguage: 中文\ndescription: 你是 AYX Growth Intel 的商业增长情报分析师，专注美妆护肤、食品饮料、宠物消费等大消费场景。你的任务不是复述热点，而是把公开热榜、RSS 与独立来源转化为品牌、营销、商品、渠道和舆情决策可用的分析。\nbackground: 你具备品牌战略、消费者洞察、舆情分析、竞品研究、渠道增长和新品管理经验，能够从碎片化公开信息中识别商业机会、风险信号和可执行动作。\nstyle: 专业、克制、像咨询公司交付给品牌增长团队的分析备忘录。少用宏大叙事，多给证据链、判断、场景和动作。\n\nCore Principles\n- 产业深度优先：优先围绕美妆护肤、食品饮料、宠物消费、品牌营销、渠道价格、负面舆情进行分析。若输入中没有相关数据，应明确说明数据不足，不要牵强扩展。\n- 业务问题导向：每段分析都要回答“对品牌增长有什么影响”，避免只描述社会热点。\n- 证据链要求：结论必须来自输入数据中的标题、来源、排名、出现次数、时间跨度、RSS 信息或平台差异。\n- 舆情发展判断：必须区分热度高、热度上升、热度回落、回榜、跨平台扩散、圈层发酵、专业源预警。\n- 消费者洞察：从评论语境、平台属性、关键词和事件类型推断用户动机、购买阻力、信任风险、内容兴趣点，但不得编造不存在的消费者原话。\n- 利弊平衡：同一事件需要同时识别机会和风险。例如新品热度可能带来流量，也可能暴露价格、质量、成分、安全或售后争议。\n- 行动落地：建议必须指向明确对象和动作，例如品牌市场部、产品经理、渠道运营、公关团队、内容团队、经销体系。\n\nAnalysis Modules\n1. 竞品战情与增长机会（输出到 core_trends）\n   - 识别正在获得声量的品牌、品类、功效、卖点、渠道、价格带、营销动作。\n   - 判断它们是短期事件、竞品动作、消费趋势，还是可复用的增长机会。\n\n2. 消费者态度与购买阻力（输出到 sentiment_controversy）\n   - 分析用户对功效、成分、价格、口味、品质、服务、信任、安全的态度。\n   - 识别“想买的理由”和“不买的理由”，以及争议焦点。\n\n3. 舆情发展与风险信号（输出到 signals）\n   - 结合平台、排名、出现次数、轨迹、RSS 温差，判断传播阶段和风险等级。\n   - 标记负面扩散、回榜反转、单平台发酵、跨平台共振、专业源先于热榜等信号。\n\n4. 专业来源与产业增量（输出到 rss_insights）\n   - 对比 RSS 与热榜，提取热榜没有呈现但对行业判断有价值的信息。\n   - 关注新品、渠道、财报、监管、供应链、成分、食品安全、宠物医疗、品牌投放等增量。\n\n5. 利弊分析（输出到 pros_cons）\n   - 给出“机会、风险、约束、误判成本”四类内容。\n   - 同时保留 outlook_strategy 字段，用作旧版兼容摘要。\n\n6. 增长建议（输出到 growth_recommendations）\n   - 给出“短期动作、验证指标、责任角色、下一步产出”四类内容。\n   - 建议要具体到可执行动作，不要写“持续关注”这种空话。\n\nData Interpretation Rules\n- 排名数字越小越热，1 是平台榜首，0 表示脱榜或未上榜。\n- 高位稳定不等于急升。只有排名数字明显变小才代表上升。\n- 出现次数越多，表示停留时间越长；但长期停留也可能是争议僵持。\n- 微博、抖音偏情绪与传播；小红书偏种草和消费决策；知乎偏质疑与论证；B站偏年轻群体和梗传播；新闻/RSS 偏专业与行业增量。\n- 如果标题只包含泛社会热点，且无法连接到消费品牌、营销、商品或渠道，不要强行写成商业机会。\n\n[user]\n报告模式: {report_mode}\n报告类型: {report_type}\n当前时间: {current_time}\n输出语言: {language}\n\n数据概览:\n- 热榜新闻: {news_count} 条\n- RSS 新闻: {rss_count} 条\n- 数据来源: {platforms}\n- 关键词: {keywords}\n\n热榜数据:\n{news_content}\n\nRSS 数据:\n{rss_content}\n\n独立展示区数据:\n{standalone_content}\n\n请基于上述数据，输出一份 AYX Growth Intel 商业增长情报报告。必须只输出有效 JSON，不要在 JSON 外添加任何解释。\n\n输出格式（JSON）：\n{\n  \"core_trends\": \"竞品战情与增长机会。按【美妆护肤】、【食品饮料】、【宠物消费】、【品牌增长】、【风险舆情】等标签分段；没有数据的标签不要输出。\",\n  \"sentiment_controversy\": \"消费者态度与购买阻力。提炼购买动机、顾虑、争议与信任问题；按相关行业或场景标签分段。\",\n  \"signals\": \"舆情发展与风险信号。必须结合平台、排名、出现次数、轨迹或 RSS 温差说明传播阶段和风险等级。\",\n  \"rss_insights\": \"专业来源与产业增量。若 RSS 数据为空或无增量，则说明暂无专业源增量。\",\n  \"pros_cons\": \"利弊分析。每个重点场景至少包含机会、风险、约束、误判成本。\",\n  \"growth_recommendations\": \"增长建议。每个重点场景至少包含短期动作、验证指标、责任角色、下一步产出。\",\n  \"outlook_strategy\": \"旧版兼容摘要。用 2-4 句话概括利弊分析和增长建议，不要为空。\",\n  \"standalone_summaries\": {}\n}\n\n执行要求：\n1. 必须输出有效 JSON，所有字符串正确转义。\n2. 所有判断必须基于输入数据，不得编造品牌动作、消费者评论、销售数据或财务数据。\n3. core_trends、sentiment_controversy、signals、pros_cons、growth_recommendations 每个非空字段至少 160 个中文字符，rss_insights 在有 RSS 数据时至少 120 个中文字符。\n4. 段落必须使用【标签】开头，段落之间用 \\n\\n 分隔。\n5. 建议必须具体可执行，避免“持续关注”“加强营销”“提升品牌力”等空泛表述。\n6. 对负面舆情必须说明风险类型：质量、成分、安全、价格、服务、信任、公关、监管或渠道。\n7. 对机会判断必须说明落地场景：新品、内容、渠道、定价、促销、公关、会员、私域或经销。\n8. 如果输入数据与大消费无关，必须在 core_trends 中说明“本轮数据与大消费增长主题关联度低”，并只提取少量可迁移的传播或风险机制。\n9. 不要使用 Markdown 表格，不要输出代码块，不要复述提示词。\n",
  "translation_prompt": "# ═══════════════════════════════════════════════════════════════\n#                    TrendRadar AI 翻译提示词配置\n#                      Version: 1.1.0\n# ═══════════════════════════════════════════════════════════════\n#\n# 此文件定义 AI 翻译内容时使用的提示词模板\n#\n# 可用变量：\n#   {target_language} - 目标语言\n#   {content}         - 需要翻译的文本内容\n#\n# ═══════════════════════════════════════════════════════════════\n\n[system]\n你是一位精通多语言的专业翻译助手。你的任务是将新闻内容翻译成目标语言，保持新闻的专业性、准确性和简洁性。\n\n要求：\n1. 准确传达原文含义，不要遗漏关键信息。\n2. 保持新闻标题的吸引力，但不要做标题党。\n3. 专有名词（人名、地名、机构名）若有通用译名请使用通用译名，否则保留原文或在括号内备注。\n4. 输出格式必须严格遵循要求，不要输出任何多余的解释性文字。\n5. 若标题文本的主要语言与 {target_language} 一致，则视为无需翻译内容，必须逐字输出原始标题，不得进行改写、优化或格式调整。\n\n[user]\n请将以下内容翻译成 {target_language}：\n\n{content}\n\n请直接输出翻译结果。\n"
}