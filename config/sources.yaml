app:
  database_path: data/ayx_growth_intel.db
  request_interval_seconds: 2
web_intel:
  endpoint: http://localhost:11235
social_intel:
  import_dir: data/social-intel
ai_report:
  enabled: true
  api_base: https://vcrppsmofoyv.cloud.sealos.io/v1
  api_key: ''
  model: glm-5
  timeout: 180
report_defaults:
  keywords:
  - 品牌
  - 产品
  - 竞品
  - 用户反馈
  - 消费
  - 市场
  core_terms:
  - 投诉
  - 维权
  - 故障
  - 召回
  - 涨价
  - 差评
  - 监管
  - 风险
  industries:
  - name: 消费零售
    keywords:
    - 消费
    - 零售
    - 品牌
    - 价格
    - 渠道
    - 新消费
    - 食品饮料
    core_terms:
    - 投诉
    - 涨价
    - 降价
    - 差评
    - 预制菜
    - 食安
    - 推荐
  - name: 新能源汽车
    keywords:
    - 新能源
    - 汽车
    - 电池
    - 充电
    - 智能驾驶
    - 车企
    core_terms:
    - 召回
    - 故障
    - 维权
    - 续航
    - 安全
    - 事故
  - name: 人工智能
    keywords:
    - AI
    - 人工智能
    - 大模型
    - 智能体
    - 算力
    - AIGC
    core_terms:
    - 发布
    - 融资
    - 监管
    - 竞品
    - 风险
    - 安全
  - name: 财经与资本
    keywords:
    - 融资
    - IPO
    - 投资
    - 资本
    - 财经
    - 消费投资
    core_terms:
    - 减持
    - 亏损
    - 监管
    - 退市
    - 并购
    - 增长
  - name: 本地生活
    keywords:
    - 餐饮
    - 零售
    - 上海
    - 本地生活
    - 服务
    - 门店
    core_terms:
    - 闭店
    - 投诉
    - 涨价
    - 食安
    - 促销
    - 体验
