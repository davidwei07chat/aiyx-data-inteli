name: aiyx-data-inteli

services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
      args:
        VITE_API_BASE: /api
    env_file: ./.env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: python -m ayx_growth_intel.api.main --config config/sources.yaml --host 0.0.0.0 --port 8088
    env_file: ./.env
    environment:
      AYX_CONFIG: config/sources.yaml
      AYX_WEB_INTEL_ENDPOINT: http://crawler:11235
      PYTHONPATH: /app/backend
    expose:
      - "8088"
    volumes:
      - aiyx_data:/app/data
      - ./config:/app/config
      - ./.env:/app/config/.env
      - ./data/social-intel:/app/data/social-intel
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      crawler:
        condition: service_healthy
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.crawler
    environment:
      CRAWLER_CONCURRENCY: 2
    expose:
      - "11235"
    init: true
    shm_size: 1gb
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11235/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  scheduler:
    image: curlimages/curl:8.15.0
    env_file: ./.env
    command:
      - /bin/sh
      - -ec
      - |
        while true; do
          curl --fail --silent --show-error --request POST http://backend:8088/collect/run-all || true
          sleep "$${COLLECT_INTERVAL_SECONDS:-3600}"
        done
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aiyx_data:
  caddy_data:
  caddy_config:
