services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: python -m ayx_growth_intel.api.main --config config/sources.yaml --host 0.0.0.0 --port 8088
    ports:
      - "8088:8088"
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    environment:
      AYX_CONFIG: config/sources.yaml

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5179:5179"
    volumes:
      - ../frontend:/app
    environment:
      VITE_API_BASE: http://localhost:8088
